apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: dexd
  labels:
    app.kubernetes.io/name: dexd
spec:
  groups:
    - name: dexd.rules
      rules:
        - alert: DexdNoSuccessfulReconcile
          expr: time() - dexd_reconcile_last_success_timestamp_seconds > 900
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: dexd has not reconciled successfully
            description: dexd has not completed a successful reconcile for more than 15 minutes.

        - alert: DexdReconcileErrors
          expr: increase(dexd_reconcile_total{result="error"}[10m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: dexd reconcile errors
            description: dexd reported one or more failed reconciles in the last 10 minutes.

        - alert: DexdChangeErrors
          expr: increase(dexd_changes_total{result="error"}[10m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: dexd DNS change errors
            description: dexd failed to apply one or more DNS changes in the last 10 minutes.

        - alert: DexdProviderErrors
          expr: increase(dexd_provider_errors_total[10m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: dexd provider errors
            description: dexd saw UniFi/provider API, network, or data errors in the last 10 minutes.

        - alert: DexdSlowReconcile
          expr: histogram_quantile(0.95, rate(dexd_reconcile_duration_seconds_bucket[15m])) > 30
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: dexd slow reconciles
            description: The p95 dexd reconcile duration has been above 30 seconds for 10 minutes.
