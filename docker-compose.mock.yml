---
# Local test stack — spin up a whoami container with the required labels so the
# agent has something to discover and push to UniFi.
# Usage:
#   docker compose -f docker-compose.mock.yml up
# Or via the Makefile:
#   make docker-mock
services:
  docker-external-dns:
    build: .
    container_name: docker-external-dns
    restart: unless-stopped
    environment:
      UNIFI_HOST: ${UNIFI_HOST}
      UNIFI_API_KEY: ${UNIFI_API_KEY}
      DEFAULT_TARGET_IP: ${DEFAULT_TARGET_IP}
      UNIFI_SITE: ${UNIFI_SITE:-default}
      UNIFI_INSECURE_SKIP_VERIFY: ${UNIFI_INSECURE_SKIP_VERIFY:-true}
      TXT_OWNER: ${TXT_OWNER:-docker-external-dns}
      TXT_PREFIX: ${TXT_PREFIX:-}
      RECONCILE_INTERVAL: ${RECONCILE_INTERVAL:-30s}
      LOG_LEVEL: debug
      DRY_RUN: ${DRY_RUN:-false}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  whoami:
    image: traefik/whoami
    container_name: whoami
    labels:
      traefik.enable: "true"
      external-dns.enabled: "true"
      traefik.http.routers.whoami.rule: Host(`whoami.${DOMAIN}`)
      traefik.http.routers.whoami.entrypoints: https
      traefik.http.routers.whoami.tls: "true"
